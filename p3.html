<!DOCTYPE html>
<html>
<head>
<title>Crypto Live Chart</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin:15px;
font-size:24px;
}

.buttons{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

button{
padding:10px 15px;
font-size:14px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
cursor:pointer;
}

button:hover{
background:#22c55e;
color:black;
}

#chart{
width:100%;
height:75vh;
}

.footer{
position:fixed;
bottom:10px;
left:10px;
font-size:14px;
color:#9ca3af;
}

@media (max-width:600px){

h1{
font-size:20px;
}

#chart{
height:70vh;
}

button{
padding:8px 12px;
font-size:13px;
}

}

</style>
</head>

<body>

<h1>Live Crypto Charts</h1>

<div class="buttons">
<button onclick="loadChart('BINANCE:ETHUSDT')">Ethereum</button>
<button onclick="loadChart('BINANCE:BTCUSDT')">Bitcoin</button>
<button onclick="loadChart('BINANCE:SOLUSDT')">Solana</button>
<button onclick="loadChart('BINANCE:XRPUSDT')">XRP</button>
</div>

<div id="chart"></div>

<div class="footer">
Created by Farhan
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

function loadChart(symbol){

document.getElementById("chart").innerHTML="";

new TradingView.widget({
"autosize":true,
"symbol":symbol,
"interval":"60",
"timezone":"Etc/UTC",
"theme":"dark",
"style":"1",
"locale":"en",
"toolbar_bg":"#1f2937",
"enable_publishing":false,
"hide_side_toolbar":false,
"allow_symbol_change":false,
"container_id":"chart"
});

}

loadChart("BINANCE:ETHUSDT");

</script>

</body>
</html>
